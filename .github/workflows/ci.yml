name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.go' || true)
          if ((${#files[@]} == 0)); then
            exit 0
          fi
          out=$(gofmt -l "${files[@]}")
          if [[ -n "$out" ]]; then
            echo "gofmt needed on:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          go build -o /dev/null -ldflags "-X main.version=${VERSION}" .

      - name: Verify --version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          go build -o spannersh.testbin -ldflags "-X main.version=${VERSION}" .
          test "$(./spannersh.testbin --version)" = "spannersh ${VERSION}"
          rm -f spannersh.testbin

      - name: go test
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go test (integration)
        run: go test -tags=integration ./...
