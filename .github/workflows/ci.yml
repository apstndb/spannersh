name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go: ["1.26", "stable"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Verify gofmt
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.go' || true)
          if ((${#files[@]} == 0)); then
            exit 0
          fi
          out=$(gofmt -l "${files[@]}")
          if [[ -n "$out" ]]; then
            echo "gofmt needed on:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          go build -o /dev/null -ldflags "-X main.version=${VERSION}" .

      - name: Verify --version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev")
          go build -o spannersh.testbin -ldflags "-X main.version=${VERSION}" .
          test "$(./spannersh.testbin --version)" = "spannersh ${VERSION}"
          rm -f spannersh.testbin

      - name: go test
        run: go test -race -shuffle=on -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.go }}
          path: coverage.out

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: go test (integration)
        run: go test -tags=integration -count=1 ./...
